name: Upload Electron Package

on:
  push:
    branches:
      - prod

concurrency:
  group: release-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # 合并到 prod 后：在 main 上 patch 版本号 → 推送 main → 合并回 prod（带 [skip-version-bump] 避免再次升版）
  # 若 main 与 prod 合并不了，请先在本地解决冲突后再推 prod
  version-bump:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-version-bump]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Bump patch on main and merge to prod
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main prod
          git checkout main
          git pull --ff-only origin main
          npm version patch --no-git-tag-version
          VER=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore(release): v${VER}"
          git push origin main
          git checkout prod
          git pull --ff-only origin prod
          git merge origin/main -m "chore: merge main for release v${VER} [skip-version-bump]"
          git push origin prod

  resolve-prod-ref:
    needs: version-bump
    if: ${{ always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pick.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve prod commit for builds
        id: pick
        run: |
          git fetch origin prod
          echo "sha=$(git rev-parse origin/prod)" >> $GITHUB_OUTPUT

  build-windows:
    needs: resolve-prod-ref
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-prod-ref.outputs.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Extract repository name
        id: extract-repo-name
        run: |
          OWNER_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $1}')
          REPO_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $2}')
          echo "owner-name=$OWNER_NAME" >> $GITHUB_OUTPUT
          echo "repo-name=$REPO_NAME" >> $GITHUB_OUTPUT
        shell: bash
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (Windows)
        run: yarn build
      - name: Rename Windows installer
        shell: pwsh
        run: |
          $pkg = Get-Content -Raw -Encoding UTF8 package.json | ConvertFrom-Json
          $v = $pkg.version
          $p = $pkg.build.productName
          $from = Join-Path 'build' ($p + ' Setup ' + $v + '.exe')
          $to = Join-Path 'build' ('Setup-' + $v + '-win-x64.exe')
          Move-Item -LiteralPath $from -Destination $to
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/Setup-*-win-x64.exe

  build-mac:
    needs: resolve-prod-ref
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-prod-ref.outputs.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (macOS Intel + Apple Silicon)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn build:mac
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: build/*.dmg

  release-github:
    needs: [build-windows, build-mac, resolve-prod-ref]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-prod-ref.outputs.sha }}
      - name: Read version from package.json
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-gh
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: |
            dist-gh/**/*.exe
            dist-gh/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-gitee:
    # 同步 Windows 安装包与 macOS DMG（注意 Gitee 单文件约 100MB 上限）
    needs: [build-windows, build-mac, resolve-prod-ref]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-prod-ref.outputs.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true
      - name: Install dependencies
        run: yarn
      - name: Upload to Gitee Release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mapfile -t files < <(find dist-release -type f \( -name '*.exe' -o -name '*.dmg' \) | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .exe or .dmg under dist-release"; ls -laR dist-release; exit 1
          fi
          node upload-gitee.js "${{ secrets.GITEE_ACCESS_TOKEN }}" "$VERSION" "${files[@]}"
